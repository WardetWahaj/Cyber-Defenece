version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cyberdefence
      POSTGRES_PASSWORD: localdev123
      POSTGRES_DB: cyberdefence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberdefence"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: frontend/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cyberdefence:localdev123@db:5432/cyberdefence
      FRONTEND_URL: http://localhost:5173
      SECRET_KEY: local-dev-secret-key-not-for-production
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn frontend.backend.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    # Uses Vite dev server for HMR. For production-like: npm run build && npx serve -s dist
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app

volumes:
  pgdata:
