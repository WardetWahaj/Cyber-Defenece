services:
  - type: web
    name: cyberdefence-backend
    runtime: python310
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn frontend.backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: cyberdefence-backend
          property: url
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
    healthCheckPath: /api/health
